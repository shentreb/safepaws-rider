<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SafePaws Rider V2.5</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:#e5e7eb;overflow:hidden}

/* BAGO: SPLASH ANIMATION */
#splash{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeOut.5s ease 1.5s forwards}
#splash div{font-size:100px;animation:pop.8s cubic-bezier(.68,-.55,.265,1.55)}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0;visibility:hidden}}

#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b)}
.login-card{background:#1e293b;padding:28px;border-radius:16px;width:90%;max-width:380px;border:1px solid #334155}
.login-card h1{text-align:center;margin:0 0 16px}
.login-card input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e5e7eb}
.login-card button{width:100%;padding:14px;margin-top:10px;border:0;border-radius:10px;background:#38bdf8;color:#0f172a;font-weight:bold;cursor:pointer}
.link{color:#38bdf8;text-align:center;margin-top:10px;cursor:pointer}
#appScreen{display:none}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#1e293b;border-bottom:1px solid #334155;position:sticky;top:0}
.logout{background:#dc2626;border:0;color:#fff;padding:8px 12px;border-radius:8px;font-weight:bold}
.subtabs{display:flex;background:#1e293b;border-bottom:1px solid #334155;overflow-x:auto}
.subtab{flex:1;padding:12px;text-align:center;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.subtab.active{border-bottom:3px solid #38bdf8;color:#38bdf8;font-weight:bold}
.screen{display:none;padding:16px;padding-bottom:80px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
.card input{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e5e7eb}
#map{height:300px;border-radius:12px;margin-top:12px}
.btn{width:100%;padding:16px;border:0;border-radius:12px;background:#16a34a;color:#fff;font-weight:bold;font-size:16px;cursor:pointer;margin-top:8px}
.btn.off{background:#dc2626}
.btn.reject{background:#dc2626}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.status-card{text-align:center;padding:40px 20px}
.status-card h2{font-size:28px;margin:0}
.pending{color:#f59e0b}.approved{color:#16a34a}.active{color:#38bdf8}
nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex}
nav button{flex:1;padding:12px;background:0;border:0;color:#94a3b8;font-size:12px;cursor:pointer}
nav button.active{color:#38bdf8}
.tab{display:none}.tab.active{display:block}
small{color:#94a3b8}
.badge{background:#f59e0b;color:#0f172a;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:bold;margin-left:4px}
.row{display:flex;justify-content:space-between;align-items:center;margin:4px 0}
</style>
</head>
<body>

<!-- BAGO: SPLASH -->
<div id="splash"><div>🏍️</div></div>

<div id="loginScreen">
  <div class="login-card">
    <h1>🏍️ SafePaws Rider</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="link" onclick="showSignup()">No account? Sign up</div>
  </div>
</div>

<div id="signupScreen" style="display:none">
  <div class="login-card">
    <h1>📝 Rider Signup</h1>
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone">
    <input id="plate" placeholder="Plate Number">
    <input id="suEmail" type="email" placeholder="Email">
    <input id="suPass" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <div class="link" onclick="showLogin()">Back to Login</div>
  </div>
</div>

<div id="appScreen">
<header>
  <h3 id="headerTitle">🏠 Home</h3>
  <button class="logout" onclick="logout()">Logout</button>
</header>
<div id="subtabs" class="subtabs" style="display:none">
  <div class="subtab active" onclick="showSub('homeSub')">Home</div>
  <div class="subtab" onclick="showSub('bookingsSub')">Bookings <span id="bookingBadge" class="badge" style="display:none">0</span></div>
  <div class="subtab" onclick="showSub('earningsSub')">Earnings</div>
  <div class="subtab" onclick="showSub('profileSub')">Profile</div>
</div>
<main>
  <div id="homeSub" class="screen tab active">
    <div id="pendingScreen" class="card status-card" style="display:none">
      <h2 class="pending">⏳ PENDING</h2>
      <p>Your application is under review by Admin.</p>
    </div>
    <div id="approvedScreen" style="display:none">
      <div class="card">
        <h3 style="margin-top:0">Go Online</h3>
        <button id="onlineBtn" class="btn off" onclick="toggleOnline()">OFFLINE</button>
        <small id="onlineStatus">Checking...</small>
      </div>
      <div id="map"></div>
    </div>
  </div>
  <div id="bookingsSub" class="screen tab">
    <div id="activeBooking"></div>
    <div id="bookingsList"></div>
  </div>
  <div id="earningsSub" class="screen tab">
    <div class="card"><h3>💰 Earnings</h3><p id="earningsText">₱0.00</p></div>
  </div>
  <div id="profileSub" class="screen tab">
    <div class="card">
      <h3>👤 My Profile</h3>
      <input id="pName" placeholder="Full Name">
      <input id="pPhone" placeholder="Phone">
      <input id="pPlate" placeholder="Plate Number">
      <small>Status: <span id="pStatus"></span></small>
      <button class="login-card button" style="margin-top:12px" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</main>
<nav>
  <button class="active" onclick="switchTab('homeSub',this)">🏠<br>Home</button>
  <button onclick="switchTab('bookingsSub',this)">📦<br>Bookings</button>
  <button onclick="switchTab('earningsSub',this)">💰<br>Earnings</button>
  <button onclick="switchTab('profileSub',this)">👤<br>Profile</button>
</nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let map, marker, uid, riderData, activeBookingId;

onAuthStateChanged(auth, async user=>{
 if(user){
  uid=user.uid;
  // BAGO: Tanggalin splash after 1.6s
  setTimeout(()=>{document.getElementById('splash').style.display='none';},1600);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('signupScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  checkStatus();
  listenBookings();
 }else{
  document.getElementById('splash').style.display='flex'; // BAGO: Pakita ulit splash pag logout
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
 }
});

async function checkStatus(){
 const ref = doc(db,'riders',uid);
 onSnapshot(ref, snap=>{
  if(!snap.exists()) return;
  riderData = snap.data();
  document.getElementById('pName').value = riderData.name || '';
  document.getElementById('pPhone').value = riderData.phone || '';
  document.getElementById('pPlate').value = riderData.plate || '';
  document.getElementById('pStatus').textContent = riderData.status || '';
  document.getElementById('earningsText').textContent = `₱${riderData.earnings||0}`;
  if(riderData.status==='approved'){
   document.getElementById('subtabs').style.display='flex';
   document.getElementById('pendingScreen').style.display='none';
   document.getElementById('approvedScreen').style.display='block';
   if(!map) initMap();
   const btn = document.getElementById('onlineBtn');
   btn.disabled = false;
   if(riderData.online){
    btn.classList.remove('off');btn.textContent='ONLINE';
    document.getElementById('onlineStatus').textContent='You are visible to customers';
   }else{
    btn.classList.add('off');btn.textContent='OFFLINE';
    document.getElementById('onlineStatus').textContent='You are hidden';
   }
  }else{
   document.getElementById('subtabs').style.display='none';
   document.getElementById('pendingScreen').style.display='block';
   document.getElementById('approvedScreen').style.display='none';
  }
 });
}

function listenBookings(){
 const q = query(collection(db,'bookings'), where('assignedRider','==',uid));
 onSnapshot(q, snap=>{
  const bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
  const active = bookings.find(b=>b.status==='assigned' || b.status==='accepted' || b.status==='picking');
  const pending = bookings.filter(b=>b.status==='assigned');
  document.getElementById('bookingBadge').style.display = pending.length>0?'inline-block':'none';
  document.getElementById('bookingBadge').textContent = pending.length;
  if(active){
   activeBookingId = active.id;
   document.getElementById('activeBooking').innerHTML = `
    <div class="card" style="border:2px solid #38bdf8">
     <h3 class="active">🚨 ACTIVE BOOKING</h3>
     <div class="row"><b>Customer:</b> ${active.customerName}</div>
     <div class="row"><b>Phone:</b> <a href="tel:${active.customerPhone}" style="color:#38bdf8">${active.customerPhone}</a></div>
     <div class="row"><b>Pet:</b> ${active.petName} - ${active.petBreed} (${active.petSize})</div>
     <div class="row"><b>Pick-up:</b> ${active.pickup}</div>
     <div class="row"><b>Drop-off:</b> ${active.dropoff}</div>
     <div class="row"><b>Fee:</b> ₱${active.fee}</div>
     ${active.status==='assigned'? `
      <button class="btn" onclick="acceptBooking('${active.id}')">Accept</button>
      <button class="btn reject" onclick="rejectBooking('${active.id}')">Reject</button>
     ` : active.status==='accepted'? `
      <button class="btn" onclick="startTrip('${active.id}')">Start Trip</button>
     ` : active.status==='picking'? `
      <button class="btn" onclick="completeTrip('${active.id}')">Complete Trip</button>
     ` : ''}
    </div>
   `;
  }else{
   document.getElementById('activeBooking').innerHTML = '<div class="card"><p>No active booking</p></div>';
  }
  document.getElementById('bookingsList').innerHTML = bookings.filter(b=>b.status==='completed').map(b=>`
   <div class="card"><b>${b.petName}</b> - ${b.pickup} > ${b.dropoff}<br><small>₱${b.fee} | Completed</small></div>
  `).join('');
 });
}

async function acceptBooking(id){ await updateDoc(doc(db,'bookings',id),{status:'accepted'}); }
window.acceptBooking=acceptBooking;
async function rejectBooking(id){ await updateDoc(doc(db,'bookings',id),{status:'rejected',assignedRider:null}); }
window.rejectBooking=rejectBooking;
async function startTrip(id){ await updateDoc(doc(db,'bookings',id),{status:'picking'}); }
window.startTrip=startTrip;
async function completeTrip(id){
 const snap = await getDoc(doc(db,'bookings',id));
 const fee = snap.data().fee || 0;
 await updateDoc(doc(db,'bookings',id),{status:'completed'});
 await updateDoc(doc(db,'riders',uid),{earnings:(riderData.earnings||0)+fee});
 alert(`Trip completed! +₱${fee}`);
}
window.completeTrip=completeTrip;

async function saveProfile(){
 const name = document.getElementById('pName').value;
 const phone = document.getElementById('pPhone').value;
 const plate = document.getElementById('pPlate').value;
 await updateDoc(doc(db,'riders',uid),{name,phone,plate});
 alert('Profile Updated!');
}
window.saveProfile=saveProfile;

async function signup(){
 const name=document.getElementById('name').value;
 const phone=document.getElementById('phone').value;
 const plate=document.getElementById('plate').value;
 const email=document.getElementById('suEmail').value;
 const pass=document.getElementById('suPass').value;
 const cred=await createUserWithEmailAndPassword(auth,email,pass);
 await setDoc(doc(db,'riders',cred.user.uid),{
  name,phone,plate,email,status:'pending',online:false,earnings:0,lat:null,lng:null
 });
 alert('Signup success! Wait for admin approval.');
 showLogin();
}
window.signup=signup;

async function login(){
 try{await signInWithEmailAndPassword(auth,document.getElementById('email').value,document.getElementById('pass').value);}
 catch(e){alert(e.message);}
}
window.login=login;
window.logout=()=>signOut(auth);
window.showSignup=()=>{document.getElementById('loginScreen').style.display='none';document.getElementById('signupScreen').style.display='flex';}
window.showLogin=()=>{document.getElementById('signupScreen').style.display='none';document.getElementById('loginScreen').style.display='flex';}

function switchTab(id,btn){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 btn.classList.add('active');
 document.getElementById('headerTitle').textContent=btn.innerText.split('\n')[0];
}
window.switchTab=switchTab;

function showSub(id){
 document.querySelectorAll('#homeSub.tab,#bookingsSub,#earningsSub,#profileSub').forEach(t=>t.classList.remove('active'));
 document.querySelectorAll('.subtab').forEach(b=>b.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 event.target.classList.add('active');
}
window.showSub=showSub;

function initMap(){
 map=L.map('map').setView([13.96,121.12],13);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
 marker=L.marker([13.96,121.12]).addTo(map);
 navigator.geolocation.watchPosition(p=>{
  const {latitude:lat,longitude:lng}=p.coords;
  marker.setLatLng([lat,lng]);
  map.setView([lat,lng]);
  if(uid && riderData?.online) updateDoc(doc(db,'riders',uid),{lat,lng});
 });
}

async function toggleOnline(){
 const btn = document.getElementById('onlineBtn');
 btn.disabled = true;
 try{
  const ref=doc(db,'riders',uid);
  const snap=await getDoc(ref);
  const on=!snap.data().online;
  await updateDoc(ref,{online:on});
 }catch(e){
  alert('Error: '+e.message);
  btn.disabled = false;
 }
}
window.toggleOnline=toggleOnline;
</script>
</body>
</html>
