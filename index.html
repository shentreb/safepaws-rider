<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePaws Rider</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0f1a; color: white; font-family: 'Segoe UI', sans-serif; }
    .nav-item.active { color: #22d3ee; }
    .nav-item { color: #64748b; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; }
  </style>
</head>
<body class="pb-20">

  <!-- HEADER -->
  <div class="flex justify-between items-center p-4">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="w-8">
    <button id="logoutBtn" class="bg-red-600 px-4 py-1 rounded-lg font-bold text-sm">Logout</button>
  </div>

  <!-- 1. HOME PAGE -->
  <div id="homePage" class="p-4">
    <h2 class="text-lg font-bold text-[#22d3ee] mb-3">Go Online</h2>
    <div class="card">
      <button id="goOnlineBtn" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl text-lg">
        ONLINE
      </button>
      <p id="onlineText" class="text-gray-400 text-sm mt-2">Tap to start accepting bookings</p>
    </div>
  </div>

  <!-- 2. BOOKINGS PAGE -->
  <div id="bookingsPage" class="p-4 hidden">
    <h2 class="text-lg font-bold text-[#22d3ee] mb-3">No active booking</h2>
    <div id="bookingList"></div>
  </div>

  <!-- 3. EARNINGS PAGE -->
  <div id="earningsPage" class="p-4 hidden">
    <h2 class="text-lg font-bold text-[#22d3ee] mb-3">Earnings</h2>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="card text-center">
        <p class="text-[#22d3ee] font-semibold">Today</p>
        <p id="todayEarn" class="text-2xl font-bold">₱0</p>
      </div>
      <div class="card text-center">
        <p class="text-[#22d3ee] font-semibold">Total</p>
        <p id="totalEarn" class="text-2xl font-bold">₱0</p>
      </div>
    </div>
    <div class="card">
      <p class="text-[#22d3ee] font-semibold mb-2">📄 Earnings History</p>
      <p id="historyText" class="text-gray-400 text-sm">No history yet</p>
    </div>
  </div>

  <!-- 4. PROFILE PAGE -->
  <div id="profilePage" class="p-4 hidden">
    <h2 class="text-lg font-bold text-[#22d3ee] mb-3">👤 My Profile</h2>
    <div class="card">
      <input id="fullName" type="text" placeholder="Full Name" class="w-full p-3 bg-[#0a0f1a] rounded-lg mb-3">
      <input id="phone" type="tel" placeholder="Phone" class="w-full p-3 bg-[#0a0f1a] rounded-lg mb-3">
      <input id="plate" type="text" placeholder="Plate Number" class="w-full p-3 bg-[#0a0f1a] rounded-lg mb-3">
      <p>Status: <span id="status" class="text-green-400">approved</span></p>
      <button id="saveBtn" class="w-full bg-green-500 text-white font-bold py-3 rounded-xl mt-4">Save Changes</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-[#1e293b] flex justify-around py-3">
    <button class="nav-item active flex-col items-center" onclick="showPage('homePage', this)"><span>🏠</span><span class="text-xs">Home</span></button>
    <button class="nav-item flex-col items-center" onclick="showPage('bookingsPage', this)"><span>📋</span><span class="text-xs">Bookings</span></button>
    <button class="nav-item flex-col items-center" onclick="showPage('earningsPage', this)"><span>💰</span><span class="text-xs">Earnings</span></button>
    <button class="nav-item flex-col items-center" onclick="showPage('profilePage', this)"><span>👤</span><span class="text-xs">Profile</span></button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, updateDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    
    const firebaseConfig = { 
      apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
      authDomain: "safepaws-batangas.firebaseapp.com",
      databaseURL: "https://safepaws-batangas-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "safepaws-batangas",
      storageBucket: "safepaws-batangas.firebasestorage.app",
      messagingSenderId: "629904615191",
      appId: "1:629904615191:web:45f7148d65ba61a867f952"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isOnline = true;
    let unsubBookings = null;
    let currentUser = null;

    // AUTH
    onAuthStateChanged(auth, async user => {
      if(!user) window.location.href = "login.html";
      currentUser = user;
      loadProfile();
      listenToBookings();
    });

    // GO ONLINE / OFFLINE
    const goBtn = document.getElementById('goOnlineBtn');
    goBtn.onclick = () => {
      isOnline = !isOnline;
      if(isOnline) {
        goBtn.classList.replace('bg-red-500','bg-green-500');
        goBtn.innerText = "ONLINE";
        document.getElementById('onlineText').innerText = "Tap to start accepting bookings";
        listenToBookings();
      } else {
        goBtn.classList.replace('bg-green-500','bg-red-500');
        goBtn.innerText = "OFFLINE";
        document.getElementById('onlineText').innerText = "You are offline";
        if(unsubBookings) unsubBookings();
      }
    }

    // LISTEN BOOKINGS
    function listenToBookings() {
      if(!isOnline) return;
      const q = query(collection(db, "bookings"), where("status", "in", ["waiting_rider", "emergency", "assigned"]));
      unsubBookings = onSnapshot(q, snap=>{
        const list = document.getElementById('bookingList');
        list.innerHTML = "";
        if(snap.empty) {
          document.getElementById('bookingsPage').querySelector('h2').innerText = "No active booking";
          return;
        }
        document.getElementById('bookingsPage').querySelector('h2').innerText = "Incoming Bookings";
        snap.forEach(d=>{
          const b = d.data();
          list.innerHTML += `
          <div class="card mb-3">
            <p><b>${b.type}</b> ${b.status==='emergency'?'🚨':''}</p>
            <p>Pet: ${b.petName || b.pet?.name}</p>
            <p>Fare: ${b.fare}</p>
            ${b.status === 'waiting_rider' || b.status === 'emergency' ? 
            `<button onclick="acceptBooking('${d.id}')" class="bg-[#22d3ee] text-black font-bold px-4 py-2 rounded mt-2 w-full">ACCEPT</button>` : 
            `<p class="text-green-400">Accepted</p>`}
          </div>`
        })
      });
    }

    window.acceptBooking = async (id) => {
      await updateDoc(doc(db,"bookings",id),{status:"assigned", riderId: currentUser.uid});
      alert("Booking Accepted!");
    }

    // PROFILE
    async function loadProfile() {
      const docSnap = await getDoc(doc(db, "riders", currentUser.uid));
      if(docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById('fullName').value = data.fullName || "";
        document.getElementById('phone').value = data.phone || "";
        document.getElementById('plate').value = data.plate || "";
        document.getElementById('status').innerText = data.status || "pending";
      }
    }
    document.getElementById('saveBtn').onclick = async () => {
      await setDoc(doc(db, "riders", currentUser.uid), {
        fullName: document.getElementById('fullName').value,
        phone: document.getElementById('phone').value,
        plate: document.getElementById('plate').value,
        email: currentUser.email
      }, {merge: true});
      alert("Profile Saved!");
    }

    // NAV
    window.showPage = (pageId, el) => {
      document.querySelectorAll('#homePage, #bookingsPage, #earningsPage, #profilePage').forEach(p=>p.classList.add('hidden'));
      document.getElementById(pageId).classList.remove('hidden');
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      el.classList.add('active');
    }

    document.getElementById('logoutBtn').onclick = () => signOut(auth);
  </script>
</body>
</html>
