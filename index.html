<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePaws Rider</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:white;font-family:Inter,system-ui}
.card{background:rgba(30,41,59,.8);backdrop-filter:blur(10px);border:1px solid rgba(148,163,184,.1);border-radius:16px;padding:20px;margin-bottom:16px;transition:.3s}
.card:hover{transform:translateY(-2px);border-color:rgba(34,197,94,.3)}
.btn{padding:12px 20px;border-radius:12px;font-weight:600;cursor:pointer;transition:.2s;border:none;width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:white}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.btn-yellow{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white}
input{width:100%;padding:12px;border-radius:10px;background:#334155;color:white;border:1px solid #475569;margin:8px 0}
input:focus{outline:none;border-color:#10b981}
.badge{background:#ef4444;color:white;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:bold}
.tab-btn{padding:10px;border-radius:10px;background:#334155;color:#94a3b8;font-weight:600}
.tab-btn.active{background:#10b981;color:white}
.emergency{border:2px solid #ef4444;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>
</head>
<body>
<div class="min-h-screen max-w-md mx-auto p-4">

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="text-center mb-6 pt-8">
    <div class="text-5xl mb-2">🚚</div>
    <h1 class="text-3xl font-bold">SafePaws Rider</h1>
    <p class="text-slate-400">Deliver pets safely & fast</p>
  </div>
  
  <div class="card">
    <h2 class="font-bold text-lg mb-3">Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn btn-green" onclick="login()">LOGIN</button>
  </div>

  <div class="card">
    <h2 class="font-bold text-lg mb-3">Sign Up</h2>
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="plate" placeholder="Plate Number">
    <input id="suEmail" type="email" placeholder="Email">
    <input id="suPass" type="password" placeholder="Password">
    <button class="btn btn-yellow" onclick="signup()">CREATE ACCOUNT</button>
  </div>
</div>

<!-- APPROVED SCREEN -->
<div id="approvedScreen" style="display:none">
  <div class="flex justify-between items-center mb-4">
    <div>
      <h1 class="text-2xl font-bold">Dashboard</h1>
      <p class="text-slate-400 text-sm" id="riderName"></p>
    </div>
    <button class="btn btn-red w-auto px-4" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <div class="flex justify-between items-center">
      <div>
        <p class="text-slate-400 text-sm">Status</p>
        <p class="font-bold text-lg" id="riderStatus">pending</p>
      </div>
      <div class="text-right">
        <p class="text-slate-400 text-sm">Today's Earnings</p>
        <p class="font-bold text-lg text-green-400">₱<span id="earningsToday">0</span></p>
      </div>
    </div>
    <button id="onlineBtn" class="btn btn-purple mt-3" onclick="toggleOnline()">GO ONLINE</button>
  </div>

  <!-- TABS -->
  <div class="flex gap-2 mb-4">
    <button class="tab-btn active flex-1" onclick="switchTab('bookings')">Bookings</button>
    <button class="tab-btn flex-1" onclick="switchTab('history')">History</button>
  </div>

  <!-- BOOKINGS TAB -->
  <div id="bookingsTab">
    <div class="flex items-center gap-2 mb-2">
      <h2 class="font-bold text-lg">🔔 New Bookings</h2>
      <span class="badge" id="bookingBadge" style="display:none">0</span>
    </div>
    <div id="bookingsList"><p class="text-slate-400">Loading...</p></div>

    <h2 class="font-bold text-lg mt-4 mb-2">📦 Active Delivery</h2>
    <div id="activeBooking"><p class="text-slate-400">No active booking</p></div>
  </div>

  <!-- HISTORY TAB -->
  <div id="historyTab" style="display:none">
    <h2 class="font-bold text-lg mb-2">📜 Delivery History</h2>
    <div id="historyList"><p class="text-slate-400">No history yet</p></div>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// PALITAN MO ITO NG SAYO
const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  databaseURL: "https://safepaws-batangas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid = null;
let riderData = null;
let activeBookingId = null;

// AUTH STATE
onAuthStateChanged(auth, async (user)=>{
  if(user){
    uid = user.uid;
    const riderSnap = await getDoc(doc(db,'riders',uid));
    if(riderSnap.exists()){
      riderData = riderSnap.data();
      document.getElementById('authScreen').style.display='none';
      document.getElementById('approvedScreen').style.display='block';
      document.getElementById('riderName').textContent = riderData.name;
      document.getElementById('riderStatus').textContent = riderData.status;
      document.getElementById('earningsToday').textContent = riderData.earningsToday || 0;
      document.getElementById('onlineBtn').textContent = riderData.online ? 'GO OFFLINE' : 'GO ONLINE';
      
      if(riderData.status !== 'approved'){
        alert("Waiting for admin approval");
      } else {
        listenBookings();
        listenHistory();
      }
    }
  } else {
    document.getElementById('authScreen').style.display='block';
    document.getElementById('approvedScreen').style.display='none';
  }
});

// LOGIN
window.login = async function(){
  try{
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    if(!email || !pass) return alert('Please fill all fields');
    await signInWithEmailAndPassword(auth, email, pass);
  }catch(e){ alert("Login Error: " + e.message); }
}

// SIGNUP
window.signup = async function(){
  try{
    const nameVal = document.getElementById('name').value.trim();
    const phoneVal = document.getElementById('phone').value.trim();
    const plateVal = document.getElementById('plate').value.trim();
    const emailVal = document.getElementById('suEmail').value.trim();
    const passVal = document.getElementById('suPass').value.trim();
    if(!nameVal || !phoneVal || !plateVal || !emailVal || !passVal) return alert('Please fill all fields');
    const userCred = await createUserWithEmailAndPassword(auth, emailVal, passVal);
    await setDoc(doc(db, 'riders', userCred.user.uid), {
      uid: userCred.user.uid, name: nameVal, phone: phoneVal, plate: plateVal,
      status: 'pending', online: false, earningsToday: 0, lastResetDate: new Date().toISOString().split('T')[0]
    });
    alert("Account created! Waiting for approval.");
  }catch(e){ alert("Signup Error: " + e.message); }
}

// LOGOUT
window.logout = async function(){ await signOut(auth); }

// TOGGLE ONLINE
async function toggleOnline(){
  const btn = document.getElementById('onlineBtn');
  btn.disabled = true;
  try{
    const ref = doc(db,'riders',uid);
    const snap = await getDoc(ref);
    const on = !snap.data().online;
    await updateDoc(ref,{online:on});
    btn.textContent = on ? 'GO OFFLINE' : 'GO ONLINE';
  }catch(e){ alert('Error: '+e.message); }
  finally{ btn.disabled = false; }
}
window.toggleOnline = toggleOnline;

// SWITCH TAB
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bookingsTab').style.display = tab=='bookings'?'block':'none';
  document.getElementById('historyTab').style.display = tab=='history'?'block':'none';
  event.target.classList.add('active');
}
window.switchTab = switchTab;

// LISTEN BOOKINGS
function listenBookings(){
  // NEW BOOKINGS
  const qNew = query(collection(db, 'bookings'), where('status', '==', 'waiting_rider'));
  onSnapshot(qNew, snap=>{
    const list = document.getElementById('bookingsList');
    list.innerHTML = "";
    if(snap.empty) { list.innerHTML = "<p class='text-slate-400'>No new bookings</p>"; return; }
    snap.forEach(d=>{
      let b = d.data();
      list.innerHTML += `
        <div class="card ${b.isEmergency?'emergency':''}">
          <div class="flex justify-between">
            <h3 class="font-bold">${b.pet.name}</h3>
            ${b.isEmergency?'<span class="text-red-400 font-bold">EMERGENCY</span>':''}
          </div>
          <p class="text-sm text-slate-400">From: ${b.customerName}</p>
          <p class="text-sm">To: ${b.clinicName}</p>
          <p class="font-bold mt-2">Fare: ₱${b.fare}</p>
          <button class="btn btn-green mt-2" onclick="acceptBooking('${d.id}')">ACCEPT</button>
        </div>`;
    });
  });

  // MY ACTIVE BOOKING
  const qMy = query(collection(db, 'bookings'), where('assignedRider', '==', uid));
  onSnapshot(qMy, snap=>{
    const bookings = snap.docs.map(d=>({id:d.id,...d.data()}));
    const pending = bookings.filter(b=>b.status==='assigned');
    document.getElementById('bookingBadge').style.display = pending.length>0?'inline-block':'none';
    document.getElementById('bookingBadge').textContent = pending.length;
    
    const active = bookings.find(b=>['assigned','accepted','picking','on_the_way'].includes(b.status));
    const div = document.getElementById('activeBooking');
    if(active){
      activeBookingId = active.id;
      let btn = '';
      if(active.status=='assigned') btn = `<button class="btn btn-yellow" onclick="updateStatus('${active.id}','picking')">MARK AS PICKED UP</button>`;
      if(active.status=='picking') btn = `<button class="btn btn-blue" onclick="updateStatus('${active.id}','on_the_way')">ARRIVED AT CLINIC</button>`;
      div.innerHTML = `
        <div class="card">
          <h3 class="font-bold">${active.pet.name}</h3>
          <p class="text-sm">Status: <b>${active.status}</b></p>
          <p class="text-sm">Clinic: ${active.clinicName}</p>
          ${btn}
        </div>`;
    } else { div.innerHTML = '<p class="text-slate-400">No active booking</p>'; }
  });
}

// LISTEN HISTORY
function listenHistory(){
  const q = query(collection(db,'bookings'), where('assignedRider','==',uid), orderBy('createdAt','desc'));
  onSnapshot(q, snap=>{
    const div = document.getElementById('historyList');
    const done = snap.docs.map(d=>({id:d.id,...d.data()})).filter(b=>b.status=='delivered');
    if(done.length==0){ div.innerHTML='<p class="text-slate-400">No history yet</p>'; return; }
    div.innerHTML = done.map(b=>`
      <div class="card">
        <h3 class="font-bold">${b.pet.name}</h3>
        <p class="text-sm">₱${b.fare} - ${b.clinicName}</p>
      </div>
    `).join('');
  });
}

// ACCEPT BOOKING
window.acceptBooking = async function(bookingId){
  await updateDoc(doc(db, 'bookings', bookingId), {
    status: 'assigned', assignedRider: uid, riderName: riderData.name
  });
}

// UPDATE STATUS
window.updateStatus = async function(bookingId, newStatus){
  await updateDoc(doc(db, 'bookings', bookingId), { status: newStatus });
  if(newStatus == 'on_the_way'){ 
    alert("Clinic has been notified!");
  }
  if(newStatus == 'delivered'){
    // Add earnings logic here
  }
}
</script>
</body>
</html>
