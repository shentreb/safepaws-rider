<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SafePaws Rider V2.3</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:#e5e7eb}
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b)}
.login-card{background:#1e293b;padding:28px;border-radius:16px;width:90%;max-width:380px;border:1px solid #334155}
.login-card h1{text-align:center;margin:0 0 16px}
.login-card input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e5e7eb}
.login-card button{width:100%;padding:14px;margin-top:10px;border:0;border-radius:10px;background:#38bdf8;color:#0f172a;font-weight:bold;cursor:pointer}
.link{color:#38bdf8;text-align:center;margin-top:10px;cursor:pointer}
#appScreen{display:none}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#1e293b;border-bottom:1px solid #334155;position:sticky;top:0}
.logout{background:#dc2626;border:0;color:#fff;padding:8px 12px;border-radius:8px;font-weight:bold}
.subtabs{display:flex;background:#1e293b;border-bottom:1px solid #334155}
.subtab{flex:1;padding:12px;text-align:center;cursor:pointer;border-bottom:3px solid transparent}
.subtab.active{border-bottom:3px solid #38bdf8;color:#38bdf8;font-weight:bold}
.screen{display:none;padding:16px;padding-bottom:80px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:12px}
#map{height:300px;border-radius:12px;margin-top:12px}
.btn{width:100%;padding:16px;border:0;border-radius:12px;background:#16a34a;color:#fff;font-weight:bold;font-size:16px;cursor:pointer}
.btn.off{background:#dc2626}
.status-card{text-align:center;padding:40px 20px}
.status-card h2{font-size:28px;margin:0}
.pending{color:#f59e0b}.approved{color:#16a34a}
nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex}
nav button{flex:1;padding:12px;background:0;border:0;color:#94a3b8;font-size:12px;cursor:pointer}
nav button.active{color:#38bdf8}
.tab{display:none}.tab.active{display:block}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>🏍️ SafePaws Rider</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="link" onclick="showSignup()">No account? Sign up</div>
  </div>
</div>

<div id="signupScreen" style="display:none">
  <div class="login-card">
    <h1>📝 Rider Signup</h1>
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone">
    <input id="plate" placeholder="Plate Number">
    <input id="suEmail" type="email" placeholder="Email">
    <input id="suPass" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <div class="link" onclick="showLogin()">Back to Login</div>
  </div>
</div>

<div id="appScreen">
<header>
  <h3 id="headerTitle">🏠 Home</h3>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div id="subtabs" class="subtabs" style="display:none">
  <div class="subtab active" onclick="showSub('homeSub')">Home</div>
  <div class="subtab" onclick="showSub('earningsSub')">Earnings</div>
  <div class="subtab" onclick="showSub('profileSub')">Profile</div>
</div>

<main>
  <div id="homeSub" class="screen tab active">
    <div id="pendingScreen" class="card status-card" style="display:none">
      <h2 class="pending">⏳ PENDING</h2>
      <p>Your application is under review by Admin.</p>
      <p>Please wait for approval.</p>
    </div>
    <div id="approvedScreen" style="display:none">
      <div class="card">
        <h3 style="margin-top:0">Go Online</h3>
        <button id="onlineBtn" class="btn off" onclick="toggleOnline()">OFFLINE</button>
      </div>
      <div id="map"></div>
    </div>
  </div>
  <div id="earningsSub" class="screen tab">
    <div class="card"><h3>💰 Earnings</h3><p id="earningsText">₱0.00</p></div>
  </div>
  <div id="profileSub" class="screen tab">
    <div class="card"><h3>👤 Profile</h3><p id="profileText"></p></div>
  </div>
</main>

<nav>
  <button class="active" onclick="switchTab('homeSub',this)">🏠<br>Home</button>
  <button onclick="switchTab('earningsSub',this)">💰<br>Earnings</button>
  <button onclick="switchTab('profileSub',this)">👤<br>Profile</button>
</nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ========================================
   🔥 LAGAY MO DITO YUNG FIREBASE CONFIG MO 🔥
   Copy mo galing Firebase Console > Project Settings
======================================== */
const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};
/* ======================================== */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let map, marker, uid;

onAuthStateChanged(auth, async user=>{
  if(user){
    uid=user.uid;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('signupScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    checkStatus();
  }else{
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('appScreen').style.display='none';
  }
});

async function checkStatus(){
  const ref = doc(db,'riders',uid);
  onSnapshot(ref, snap=>{
    if(!snap.exists()) return;
    const r = snap.data();
    document.getElementById('profileText').textContent = `${r.name} | ${r.plate} | ${r.status}`;
    document.getElementById('earningsText').textContent = `₱${r.earnings||0}`;
    if(r.status==='approved'){
      document.getElementById('subtabs').style.display='flex';
      document.getElementById('pendingScreen').style.display='none';
      document.getElementById('approvedScreen').style.display='block';
      if(!map) initMap();
      if(r.online){document.getElementById('onlineBtn').classList.remove('off');document.getElementById('onlineBtn').textContent='ONLINE';}
      else{document.getElementById('onlineBtn').classList.add('off');document.getElementById('onlineBtn').textContent='OFFLINE';}
    }else{
      document.getElementById('subtabs').style.display='none';
      document.getElementById('pendingScreen').style.display='block';
      document.getElementById('approvedScreen').style.display='none';
    }
  });
}

async function signup(){
  const name=document.getElementById('name').value;
  const phone=document.getElementById('phone').value;
  const plate=document.getElementById('plate').value;
  const email=document.getElementById('suEmail').value;
  const pass=document.getElementById('suPass').value;
  const cred=await createUserWithEmailAndPassword(auth,email,pass);
  await setDoc(doc(db,'riders',cred.user.uid),{
    name,phone,plate,email,status:'pending',online:false,earnings:0,lat:null,lng:null
  });
  alert('Signup success! Wait for admin approval.');
  showLogin();
}
window.signup=signup;

async function login(){
  try{await signInWithEmailAndPassword(auth,document.getElementById('email').value,document.getElementById('pass').value);}
  catch(e){alert(e.message);}
}
window.login=login;
window.logout=()=>signOut(auth);
window.showSignup=()=>{document.getElementById('loginScreen').style.display='none';document.getElementById('signupScreen').style.display='flex';}
window.showLogin=()=>{document.getElementById('signupScreen').style.display='none';document.getElementById('loginScreen').style.display='flex';}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('headerTitle').textContent=btn.innerText.split('\n')[0];
}
window.switchTab=switchTab;

function showSub(id){
  document.querySelectorAll('#homeSub.tab,#earningsSub,#profileSub').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.subtab').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
window.showSub=showSub;

function initMap(){
  map=L.map('map').setView([13.96,121.12],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  marker=L.marker([13.96,121.12]).addTo(map);
  navigator.geolocation.watchPosition(p=>{
    const {latitude:lat,longitude:lng}=p.coords;
    marker.setLatLng([lat,lng]); map.setView([lat,lng]);
    if(uid) updateDoc(doc(db,'riders',uid),{lat,lng});
  });
}

async function toggleOnline(){
  const ref=doc(db,'riders',uid);
  const snap=await getDoc(ref);
  const on=!snap.data().online;
  await updateDoc(ref,{online:on});
}
window.toggleOnline=toggleOnline;
</script>
</body>
</html>
