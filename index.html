<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePaws🐾 V10.5</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial; }
  body { background: #f5f5f5; overflow: hidden; }
  #map { height: 100vh; width: 100%; z-index: 1; }
  #sheet { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: white; border-radius: 24px 24px 0 0; 
    padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); 
    max-height: 90vh; overflow-y: auto; z-index: 1000;
    transition: transform 0.3s ease;
  }
  .handle { 
    width: 50px; height: 6px; background: #ddd; 
    border-radius: 10px; margin: 0 auto 15px; cursor: grab; 
  }
  .handle:active { cursor: grabbing; }
  h2 { color: #009688; margin-bottom: 15px; }
  label { font-weight: 600; font-size: 14px; display: block; margin-top: 10px; }
  select, button, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 15px; }
  button.primary { background: #009688; color: white; border: none; font-weight: bold; font-size: 16px; }
  button.secondary { background: #e0f2f1; color: #009688; border: 1px solid #009688; }
  .row { display: flex; gap: 10px; }
  .row select { flex: 1; }
  .receipt { background: #e0f2f1; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 4px solid #009688; }
  .badge { background: #ff9800; color: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
  #petForm { background: #f1f8e9; padding: 12px; border-radius: 10px; margin: 10px 0; display: none; }
  .clinic-option { background: #fff3e0; padding: 10px; border-radius: 8px; margin: 5px 0; cursor: pointer; border: 1px solid #ff9800; }
  #fareBox { background:#fff3e0; padding:10px; border-radius:8px; margin:10px 0; display:block; } /* LAGING VISIBLE */
</style>
</head>
<body>

<div id="map"></div>

<div id="sheet">
  <div class="handle"></div>
  <h2>Book a Service <span class="badge">V10.5</span></h2>

  <label>Your Pets</label>
  <div class="row">
    <select id="petSelect"></select>
    <button class="secondary" onclick="togglePetForm()" style="width:60px;">+ Add</button>
  </div>

  <div id="petForm">
    <input type="text" id="petName" placeholder="Pet Name" required>
    <select id="petType" required>
      <option value="">Select Pet Type</option>
      <option value="Dog">Dog</option>
      <option value="Cat">Cat</option>
      <option value="Bird">Bird</option>
      <option value="Rabbit">Rabbit</option>
    </select>
    <select id="petSize" required> <!-- DAGDAG PET SIZE -->
      <option value="">Select Pet Size</option>
      <option value="Small">Small - x1.0</option>
      <option value="Medium">Medium - x1.5</option>
      <option value="Large">Large - x2.0</option>
    </select>
    <input type="text" id="petBreed" placeholder="Breed">
    <input type="date" id="petBirthdate" required>
    <button class="primary" onclick="savePet()">Save Pet</button>
  </div>

  <label>Service Type</label>
  <select id="serviceSelect" onchange="updatePins()">
    <option value="Pet Transport">Pet Transport - 2 Pins</option>
    <option value="Vet Clinic">Vet Clinic - Choose Nearest</option>
    <option value="Grooming">Grooming - Choose Nearest</option>
    <option value="Clinic">Clinic - Choose Nearest</option>
    <option value="Emergency">Emergency - +₱100</option>
  </select>

  <div id="clinicList" style="display:none; margin:10px 0;">
    <label>Select Nearest Clinic:</label>
    <div id="clinicOptions"></div>
    <button class="secondary" onclick="manualPinMode()">Or Tap Map Manually</button>
  </div>

  <p id="pinInfo" style="font-size:13px; color:#666; margin:10px 0;">📍 Tap map: 2 pins needed</p>

  <div id="fareBox"> <!-- LAGING NAKIKITA -->
    <b>Est. Fare:</b> <span id="fareAmount">₱0.00</span><br>
    <small id="fareBreakdown">Base: ₱200</small>
  </div>

  <button class="primary" onclick="requestBooking()">Request Now</button>
  <div id="receiptBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  databaseURL: "https://safepaws-batangas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const BASE = 200;
const PER_KM = 20;
const EMERGENCY_FEE = 100;
const SIZE_MULTIPLIER = {Small: 1.0, Medium: 1.5, Large: 2.0};

let pets = [];
let pickupPin = null;
let dropPin = null;
let pickupMarker, dropMarker;
let userLocation = null;
let manualMode = false;
let currentUser = null;
let currentBookingId = null;

const clinics = [
  {name: "Batangas Animal Clinic", lat: 13.7561, lng: 121.0583, type: "Vet Clinic", address: "Batangas City"},
  {name: "Pawsome Grooming Studio", lat: 13.7580, lng: 121.0600, type: "Grooming", address: "Batangas City"},
  {name: "Lipa Pet Care Center", lat: 13.9412, lng: 121.1625, type: "Vet Clinic", address: "Lipa City"},
  {name: "Furry Friends Grooming", lat: 13.9430, lng: 121.1640, type: "Grooming", address: "Lipa City"},
  {name: "Tanauan Veterinary Clinic", lat: 14.0831, lng: 121.1528, type: "Clinic", address: "Tanauan City"},
  {name: "24/7 Emergency Pet Hospital", lat: 13.7570, lng: 121.0590, type: "Clinic", address: "Batangas City"}
];
let clinicMarkers = [];

var map = L.map('map').setView([13.7561, 121.0583], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

if(navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    userLocation = {lat: pos.coords.latitude, lng: pos.coords.longitude};
    map.setView([userLocation.lat, userLocation.lng], 13);
    L.marker(userLocation).addTo(map).bindPopup("Your Current Location").openPopup();
  });
}

auth.signInAnonymously().then(cred => {
  currentUser = cred.user;
  loadPets();
}).catch(() => {
  loadPetsLocal();
});

function loadPets() {
  if(!currentUser) return loadPetsLocal();
  db.collection('users').doc(currentUser.uid).collection('pets').get().then(snap => {
    pets = [];
    snap.forEach(doc => { pets.push({id: doc.id,...doc.data()}); });
    renderPets();
  }).catch(() => loadPetsLocal());
}

function loadPetsLocal() {
  pets = JSON.parse(localStorage.getItem('safepaws_pets')) || [];
  renderPets();
}

function getRequiredPins() {
  let service = document.getElementById('serviceSelect').value;
  if(service == 'Pet Transport') return 2;
  if(service == 'Vet Clinic' || service == 'Grooming' || service == 'Clinic') return 1;
  return 0;
}

function updatePins() {
  pickupPin = null; dropPin = null; manualMode = false;
  if(pickupMarker) map.removeLayer(pickupMarker);
  if(dropMarker) map.removeLayer(dropMarker);
  clinicMarkers.forEach(m => map.removeLayer(m)); clinicMarkers = [];
  document.getElementById('clinicList').style.display = 'none';

  let service = document.getElementById('serviceSelect').value;
  document.getElementById('pinInfo').innerText = `Tap map: ${getRequiredPins()} pin(s) needed`;
  checkFare(); // UPDATE FARE ON CHANGE

  if(service == 'Vet Clinic' || service == 'Grooming' || service == 'Clinic') {
    showClinicOptions(service);
  }
}

function showClinicOptions(serviceType) {
  document.getElementById('clinicList').style.display = 'block';
  let center = userLocation || {lat: 13.7561, lng: 121.0583};

  let filtered = clinics
   .filter(c => c.type == serviceType)
   .map(c => ({...c, dist: getDistanceKm(center, c)}))
   .sort((a,b) => a.dist - b.dist).slice(0, 5);

  let optionsDiv = document.getElementById('clinicOptions');
  optionsDiv.innerHTML = '';
  filtered.forEach((c) => {
    optionsDiv.innerHTML += `<div class="clinic-option" onclick="selectClinic(${c.lat}, ${c.lng}, '${c.name}')"><b>${c.name}</b><br><small>${c.address} - ${c.dist.toFixed(2)} km away</small></div>`;
    let marker = L.marker([c.lat, c.lng]).addTo(map).bindPopup(`<b>${c.name}</b><br>${c.address}<br>${c.dist.toFixed(2)} km`);
    clinicMarkers.push(marker);
  });
}

function selectClinic(lat, lng, name) {
  if(dropMarker) map.removeLayer(dropMarker);
  dropPin = {lat, lng}; dropMarker = L.marker([lat, lng]).addTo(map).bindPopup(`Selected: ${name}`).openPopup();
  map.setView([lat, lng], 15); checkFare();
}

function manualPinMode() { manualMode = true; alert("Tap the map to set custom location for your pet"); document.getElementById('clinicList').style.display = 'none'; }

map.on('click', function(e) {
  let service = document.getElementById('serviceSelect').value;
  let req = getRequiredPins();
  if((service == 'Vet Clinic' || service == 'Grooming' || service == 'Clinic') && manualMode) {
    if(dropMarker) map.removeLayer(dropMarker);
    dropPin = e.latlng; dropMarker = L.marker(dropPin).addTo(map).bindPopup("Custom Location").openPopup(); checkFare(); return;
  }
  if(req == 2 &&!pickupPin) {
    pickupPin = e.latlng; if(pickupMarker) map.removeLayer(pickupMarker);
    pickupMarker = L.marker(pickupPin).addTo(map).bindPopup("Pickup Location").openPopup(); checkFare();
  } else if(req >= 1 && service == 'Pet Transport') {
    dropPin = e.latlng; if(dropMarker) map.removeLayer(dropMarker);
    dropMarker = L.marker(dropPin).addTo(map).bindPopup("Drop Location").openPopup(); checkFare();
  }
});

function togglePetForm() {
  let form = document.getElementById('petForm');
  form.style.display = form.style.display == 'block'? 'none' : 'block';
}

function renderPets() {
  let select = document.getElementById('petSelect');
  select.innerHTML = '<option value="">-- Select Pet --</option>';
  pets.forEach((p, i) => {
    let age = calcAge(p.birthdate);
    select.innerHTML += `<option value="${p.id || i}">${p.name} - ${p.petType} - ${p.petSize || 'N/A'} - ${age} yrs</option>`;
  });
}

function savePet() {
  let name = document.getElementById('petName').value;
  let petType = document.getElementById('petType').value;
  let petSize = document.getElementById('petSize').value; // #DAG
  let breed = document.getElementById('petBreed').value;
  let birthdate = document.getElementById('petBirthdate').value;
  if(!name ||!petType ||!petSize ||!birthdate) return alert("Please fill all required fields");

  let newPet = {name, petType, petSize, breed, birthdate, createdAt: new Date()};

  if(currentUser) {
    db.collection('users').doc(currentUser.uid).collection('pets').add(newPet).then(() => {
      alert("Pet Saved to Firebase!");
      document.getElementById('petName').value = '';
      document.getElementById('petType').value = '';
      document.getElementById('petSize').value = '';
      document.getElementById('petBreed').value = '';
      document.getElementById('petBirthdate').value = '';
      togglePetForm(); loadPets();
    }).catch(err => alert("Save Error: " + err.message));
  } else {
    pets.push(newPet); localStorage.setItem('safepaws_pets', JSON.stringify(pets));
    alert("Pet Saved Locally!");
    document.getElementById('petName').value = '';
    document.getElementById('petType').value = '';
    document.getElementById('petSize').value = '';
    document.getElementById('petBreed').value = '';
    document.getElementById('petBirthdate').value = '';
    togglePetForm(); renderPets();
  }
}

function calcAge(birthdate) {
  let diff = new Date() - new Date(birthdate);
  return Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
}

function getDistanceKm(p1, p2) { return map.distance([p1.lat, p1.lng], [p2.lat, p2.lng]) / 1000; }

function calcFare(km, service, petSize) { // #AYOS NA FARE
  let fare = BASE;
  if(service == 'Emergency') fare += EMERGENCY_FEE;
  fare += (km * PER_KM);
  fare = fare * (SIZE_MULTIPLIER[petSize] || 1.0);
  return fare;
}

function checkFare() { // #LAGING COMPUTE
  let service = document.getElementById('serviceSelect').value;
  let petIndex = document.getElementById('petSelect').value;
  let pet = pets[petIndex];
  let km = (pickupPin && dropPin)? getDistanceKm(pickupPin, dropPin) : 0;
  let fare = calcFare(km, service, pet ? pet.petSize : 'Small');
  
  document.getElementById('fareAmount').innerText = `₱${fare.toFixed(2)} - ${km.toFixed(2)} km`;
  let breakdown = `Base: ₱${BASE}`;
  if(service == 'Emergency') breakdown += ` + Emergency: ₱${EMERGENCY_FEE}`;
  if(km > 0) breakdown += ` + KM: ₱${(km * PER_KM).toFixed(2)}`;
  if(pet) breakdown += ` x ${pet.petSize}(${SIZE_MULTIPLIER[pet.petSize]})`;
  document.getElementById('fareBreakdown').innerText = breakdown;
}

function requestBooking() {
  let petIndex = document.getElementById('petSelect').value;
  if(petIndex === "") return alert("Please select a pet");
  let pet = pets[petIndex];
  let service = document.getElementById('serviceSelect').value;
  if(getRequiredPins() > 0 &&!dropPin) return alert("Please set location");
  if(getRequiredPins() == 2 &&!pickupPin) return alert("Please set pickup location");

  let km = (pickupPin && dropPin)? getDistanceKm(pickupPin, dropPin) : 0;
  let fare = calcFare(km, service, pet.petSize);

  // #ITO YUNG PAPASOK SA RIDER/CLINIC APP
  db.collection('bookings').add({
    userId: currentUser? currentUser.uid : "guest",
    service: service, pet: pet, pickup: pickupPin, drop: dropPin,
    km: km.toFixed(2), fare: fare.toFixed(2), status: 'pending', // PENDING PARA MAKITA NG RIDER
    petTypes: [pet.petType],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then((docRef) => {
    currentBookingId = docRef.id;
    alert(`Booking Sent! Waiting for rider...`);
    listenForBookingUpdate(docRef.id); // #MAGHIHINTAY NG RECEIPT
  }).catch(err => alert("Error: " + err.message));
}

// #HINDI NA AUTO RECEIPT. MAGHIHINTAY MUNA
function listenForBookingUpdate(bookingId) {
  db.collection('bookings').doc(bookingId).onSnapshot((doc) => {
    if(doc.exists && doc.data().status == 'accepted') {
      let data = doc.data();
      if(data.service == 'Vet Clinic' || data.service == 'Clinic') {
        document.getElementById('receiptBox').innerHTML = `
          <div class="receipt">
            <b>🧾 BILL FROM CLINIC</b><br><br>
            Pet: ${data.pet.name} - ${data.pet.petType}<br>
            Service: ${data.service}<br>
            Consultation: ₱500<br>
            Medicine: ₱350<br>
            <hr style="margin:8px 0;">
            <b>TOTAL: ₱850</b><br>
            <small>Notes: Follow up after 2 weeks</small>
          </div>
        `;
      }
    }
  });
}

// ===== DRAGGABLE SHEET AYOS NA TO =====
let sheet = document.getElementById('sheet');
let handle = document.querySelector('.handle');
let startY = 0;
let currentY = 0;
let isDragging = false;

handle.addEventListener('touchstart', startDrag);
handle.addEventListener('mousedown', startDrag);

function startDrag(e) {
  isDragging = true;
  startY = e.touches ? e.touches[0].clientY : e.clientY;
  sheet.style.transition = 'none';
}

document.addEventListener('touchmove', drag);
document.addEventListener('mousemove', drag);

function drag(e) {
  if(!isDragging) return;
  let y = e.touches ? e.touches[0].clientY : e.clientY;
  currentY = y - startY;
  if(currentY > 0 && currentY < window.innerHeight * 0.8) {
    sheet.style.transform = `translateY(${currentY}px)`;
  }
}

document.addEventListener('touchend', endDrag);
document.addEventListener('mouseup', endDrag);

function endDrag() {
  if(!isDragging) return;
  isDragging = false;
  sheet.style.transition = 'transform 0.3s ease';
  
  if(currentY > 150) {
    sheet.style.transform = 'translateY(75vh)';
  } else {
    sheet.style.transform = 'translateY(0)';
  }
  currentY = 0;
}
</script>
</body>
</html>
