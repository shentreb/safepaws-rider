<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePaws Rider</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:white;font-family:Inter,system-ui}
.card{background:rgba(30,41,59,.8);backdrop-filter:blur(10px);border:1px solid rgba(148,163,184,.1);border-radius:16px;padding:20px;margin-bottom:16px}
.btn{padding:12px 20px;border-radius:12px;font-weight:600;cursor:pointer;width:100%;border:none}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:white}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.btn-yellow{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white}
input{width:100%;padding:12px;border-radius:10px;background:#334155;color:white;border:1px solid #475569;margin:8px 0}
.tab-btn{padding:10px;border-radius:10px;background:#334155;color:#94a3b8;font-weight:600;flex:1}
.tab-btn.active{background:#10b981;color:white}
.emergency{border:2px solid #ef4444;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>
</head>
<body>
<div class="min-h-screen max-w-md mx-auto p-4">

<!-- AUTH SCREEN - MALINIS NA -->
<div id="authScreen">
  <div class="text-center mb-6 pt-8">
    <div class="text-5xl mb-2">🚚</div>
    <h1 class="text-3xl font-bold">SafePaws Rider</h1>
    <p class="text-slate-400">Deliver pets safely</p>
  </div>

  <div class="flex gap-2 mb-4">
    <button id="loginTabBtn" class="tab-btn active" onclick="showAuthTab('login')">LOGIN</button>
    <button id="signupTabBtn" class="tab-btn" onclick="showAuthTab('signup')">SIGN UP</button>
  </div>
  
  <!-- LOGIN -->
  <div id="loginForm" class="card">
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn btn-green" onclick="login()">LOGIN</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" class="card" style="display:none">
    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="plate" placeholder="Plate Number">
    <input id="suEmail" type="email" placeholder="Email">
    <input id="suPass" type="password" placeholder="Password">
    <button class="btn btn-yellow" onclick="signup()">CREATE ACCOUNT</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="approvedScreen" style="display:none">
  <div class="flex justify-between items-center mb-4">
    <div>
      <h1 class="text-2xl font-bold">Dashboard</h1>
      <p class="text-slate-400 text-sm" id="riderName"></p>
    </div>
    <button class="btn btn-red w-auto px-4" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <div class="flex justify-between">
      <div>
        <p class="text-slate-400 text-sm">Status</p>
        <p class="font-bold" id="riderStatus">pending</p>
      </div>
      <div class="text-right">
        <p class="text-slate-400 text-sm">Earnings Today</p>
        <p class="font-bold text-green-400">₱<span id="earningsToday">0</span></p>
      </div>
    </div>
    <button id="onlineBtn" class="btn btn-purple mt-3" onclick="toggleOnline()">GO ONLINE</button>
  </div>

  <h2 class="font-bold text-lg mb-2">🔔 New Bookings</h2>
  <div id="bookingsList"><p class="text-slate-400">Loading...</p></div>

  <h2 class="font-bold text-lg mt-4 mb-2">📦 Active Delivery</h2>
  <div id="activeBooking"><p class="text-slate-400">No active booking</p></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  databaseURL: "https://safepaws-batangas-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let uid = null; let riderData = null;

// SWITCH TAB LOGIN/SIGNUP
function showAuthTab(tab){
  document.getElementById('loginForm').style.display = tab=='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab=='signup'?'block':'none';
  document.getElementById('loginTabBtn').classList.remove('active');
  document.getElementById('signupTabBtn').classList.remove('active');
  document.getElementById(tab+'TabBtn').classList.add('active');
}
window.showAuthTab = showAuthTab;

// AUTH
onAuthStateChanged(auth, async (user)=>{
  if(user){
    uid = user.uid;
    const snap = await getDoc(doc(db,'riders',uid));
    if(snap.exists()){
      riderData = snap.data();
      document.getElementById('authScreen').style.display='none';
      document.getElementById('approvedScreen').style.display='block';
      document.getElementById('riderName').textContent = riderData.name;
      document.getElementById('riderStatus').textContent = riderData.status;
      document.getElementById('earningsToday').textContent = riderData.earningsToday || 0;
      document.getElementById('onlineBtn').textContent = riderData.online ? 'GO OFFLINE' : 'GO ONLINE';
      if(riderData.status == 'approved'){ listenBookings(); }
      else{ alert("Waiting for admin approval"); }
    }
  } else {
    document.getElementById('authScreen').style.display='block';
    document.getElementById('approvedScreen').style.display='none';
  }
});

// LOGIN
window.login = async () => {
  try{
    await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
  }catch(e){ alert("Error: " + e.message); }
}

// SIGNUP
window.signup = async () => {
  try{
    const cred = await createUserWithEmailAndPassword(auth, document.getElementById('suEmail').value, document.getElementById('suPass').value);
    await setDoc(doc(db, 'riders', cred.user.uid), {
      uid: cred.user.uid, name: document.getElementById('name').value, phone: document.getElementById('phone').value, 
      plate: document.getElementById('plate').value, status: 'pending', online: false, earningsToday: 0
    });
    alert("Account created! Wait for approval.");
  }catch(e){ alert("Error: " + e.message); }
}

// LOGOUT
window.logout = async () => { await signOut(auth); }

// TOGGLE ONLINE
window.toggleOnline = async () => {
  const ref = doc(db,'riders',uid);
  const snap = await getDoc(ref);
  const on = !snap.data().online;
  await updateDoc(ref,{online:on});
  document.getElementById('onlineBtn').textContent = on ? 'GO OFFLINE' : 'GO ONLINE';
}

// LISTEN BOOKINGS
function listenBookings(){
  onSnapshot(query(collection(db, 'bookings'), where('status', '==', 'waiting_rider')), snap=>{
    const list = document.getElementById('bookingsList');
    list.innerHTML = snap.empty ? "<p class='text-slate-400'>No new bookings</p>" : "";
    snap.forEach(d=>{
      let b = d.data();
      list.innerHTML += `<div class="card ${b.isEmergency?'emergency':''}">
        <h3 class="font-bold">${b.pet.name}</h3><p>To: ${b.clinicName}</p><p>₱${b.fare}</p>
        <button class="btn btn-green mt-2" onclick="acceptBooking('${d.id}')">ACCEPT</button></div>`;
    });
  });

  onSnapshot(query(collection(db, 'bookings'), where('assignedRider', '==', uid)), snap=>{
    const active = snap.docs.map(d=>({id:d.id,...d.data()})).find(b=>['assigned','picking'].includes(b.status));
    const div = document.getElementById('activeBooking');
    if(active){
      let btn = active.status=='assigned' ? `<button class="btn btn-yellow" onclick="updateStatus('${active.id}','picking')">PICKED UP</button>` : 
                `<button class="btn btn-purple" onclick="updateStatus('${active.id}','on_the_way')">ARRIVED AT CLINIC</button>`;
      div.innerHTML = `<div class="card"><h3 class="font-bold">${active.pet.name}</h3><p>Status: ${active.status}</p>${btn}</div>`;
    } else { div.innerHTML = '<p class="text-slate-400">No active booking</p>'; }
  });
}

// ACCEPT + UPDATE
window.acceptBooking = async (id) => {
  await updateDoc(doc(db, 'bookings', id), {status: 'assigned', assignedRider: uid, riderName: riderData.name});
}
window.updateStatus = async (id, status) => {
  await updateDoc(doc(db, 'bookings', id), {status: status});
  if(status == 'on_the_way'){ alert("Clinic Notified!"); }
}
</script>
</body>
</html>
