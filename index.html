<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>SafePaws</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{--bg:#0b1020;--glass:rgba(22,33,62,.7);--accent:#38bdf8}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body,html{margin:0;padding:0;height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI';background:var(--bg);color:#fff;overflow:hidden}

/* FIX: BINALIK YUNG SPLASH ANIMATION */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeOut.5s ease 1.5s forwards}
#splash div{font-size:100px;animation:pop.8s cubic-bezier(.68,-.55,.265,1.55)}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0;visibility:hidden}}

#loginScreen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:20px;z-index:500}
.login-box{width:100%;max-width:360px}.login-box h1{font-size:40px;text-align:center;margin:0 0 30px}
.login-box input{width:100%;padding:18px;margin:8px 0;border-radius:16px;border:0;background:var(--glass);color:#fff;font-size:16px}
.login-box button{width:100%;padding:18px;margin-top:12px;border:0;border-radius:16px;background:var(--accent);color:#0b1020;font-weight:800;font-size:17px}
#app{position:fixed;inset:0;display:none}
#map{position:absolute;inset:0;z-index:1}
.fab{position:absolute;top:50px;right:20px;z-index:10;background:var(--glass);backdrop-filter:blur(20px);border:0;width:50px;height:50px;border-radius:50%;font-size:22px;color:#fff}
.bottom-sheet{position:absolute;bottom:0;left:0;right:0;z-index:10;background:var(--glass);backdrop-filter:blur(30px);border-radius:30px 30px 0 0;padding:20px;max-height:60vh;overflow-y:auto}
.handle{width:40px;height:5px;background:#475569;border-radius:10px;margin:0 auto 15px}
.search-bar{display:flex;gap:10px;align-items:center;background:rgba(0,0,0,.3);padding:15px;border-radius:18px}
.search-bar input{flex:1;background:0;border:0;color:#fff;font-size:16px;outline:0}
.swap{background:var(--accent);border:0;width:40px;height:40px;border-radius:12px;font-size:20px;color:#0b1020}
.btn{width:100%;padding:18px;margin-top:15px;border:0;border-radius:16px;background:var(--accent);color:#0b1020;font-weight:800;font-size:17px}
.btn.danger{background:#dc2626;color:#fff}
.card{background:rgba(0,0,0,.3);padding:15px;border-radius:18px;margin:10px 0}
.rider-row{display:flex;align-items:center;gap:12px}.avatar{width:50px;height:50px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px}
.status{width:100%;text-align:center;padding:12px;border-radius:14px;font-weight:800;margin:12px 0}
.dots{display:flex;justify-content:space-between;padding:0 10px}.dot{width:12px;height:12px;border-radius:50%;background:#334155}.dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.bottom-nav{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:30px;background:var(--glass);backdrop-filter:blur(30px);padding:12px 30px;border-radius:999px}
.bottom-nav button{background:0;border:0;color:#94a3b8;font-size:24px}
.bottom-nav button.on{color:var(--accent)}
.page{display:none;height:100%;padding:80px 20px 100px;overflow-y:auto}.page.on{display:block}
select{width:100%;padding:15px;margin-top:10px;border-radius:18px;border:0;background:rgba(0,0,0,.3);color:#fff;font-size:16px}
.toggle{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:14px}
.toggle input{width:40px;height:24px}
hr{border:0;border-top:1px solid #334155;margin:8px 0}
</style>
</head>
<body>

<div id="splash"><div>🐾</div></div>

<div id="loginScreen">
  <div class="login-box">
    <h1>🐾 SafePaws</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="app">
  <div id="map"></div>
  <button class="fab" onclick="logout()">⏻</button>

  <div id="bookPage" class="page on">
    <div class="bottom-sheet" id="sheet">
      <div class="handle"></div>
      <div id="bookView">
        <div class="search-bar">
          <span>🟢</span><input id="pickup" placeholder="Pick-up Location">
          <button class="swap" onclick="swap()">⇅</button>
        </div>
        <div class="search-bar" style="margin-top:10px">
          <span>🔴</span><input id="dropoff" placeholder="Drop-off Location">
        </div>
        <input id="petName" placeholder="Pet Name" style="width:100%;margin-top:10px;padding:15px;border-radius:18px;border:0;background:rgba(0,0,0,.3);color:#fff">
        <select id="petSize">
          <option value="small">Small Pet - 0kg to 10kg</option>
          <option value="medium">Medium Pet - 11kg to 25kg +₱50</option>
          <option value="large">Large Pet - 26kg+ +₱100</option>
        </select>
        <div class="toggle">
          <input type="checkbox" id="emergency">
          <label for="emergency">🚨 Emergency/Rescue Mode +₱100</label>
        </div>
        <button class="btn" id="bookBtn" onclick="book()">Book Pet Ride</button>
      </div>

      <div id="trackView" style="display:none">
        <div class="card rider-row">
          <div class="avatar">🏍️</div>
          <div><b id="rName">Finding Rider...</b><br><small id="rPlate"></small></div>
          <div style="margin-left:auto;font-size:24px" onclick="alert('Calling Rider...')">📞</div>
        </div>
        <div class="card" id="fareCard">
          <div style="display:flex;justify-content:space-between"><span>Distance</span><b id="km">0.0 km</b></div>
          <div style="display:flex;justify-content:space-between;font-size:14px;color:#94a3b8"><span>Base Fare</span><span>₱80</span></div>
          <div style="display:flex;justify-content:space-between;font-size:14px;color:#94a3b8"><span id="kmLabel">0.0 km x ₱15</span><span id="kmFee">₱0</span></div>
          <div id="sizeFeeRow" style="display:none;justify-content:space-between;font-size:14px;color:#94a3b8"><span>Pet Size Fee</span><span id="sizeFee">₱0</span></div>
          <div id="nightFeeRow" style="display:none;justify-content:space-between;font-size:14px;color:#94a3b8"><span>Night Fee</span><span>₱30</span></div>
          <div id="emergFeeRow" style="display:none;justify-content:space-between;font-size:14px;color:#94a3b8"><span>Emergency Fee</span><span>₱100</span></div>
          <hr>
          <div style="display:flex;justify-content:space-between;font-weight:800;font-size:18px"><span>Total Fare</span><b id="fare">₱0</b></div>
          <div id="status" class="status">Waiting...</div>
          <div class="dots"><div id="d1" class="dot on"></div><div id="d2" class="dot"></div><div id="d3" class="dot"></div><div id="d4" class="dot"></div></div>
        </div>
        <button class="btn danger" onclick="cancel()">Cancel Ride</button>
      </div>
    </div>
  </div>

  <div id="historyPage" class="page"><h2>📜 Ride History</h2><div id="historyList"></div></div>
  <div id="profilePage" class="page"><h2>👤 Profile</h2><input id="pName" placeholder="Full Name" style="width:100%;padding:15px;margin:10px 0;border-radius:18px;border:0;background:var(--glass);color:#fff"><input id="pPhone" placeholder="Phone Number" style="width:100%;padding:15px;margin:10px 0;border-radius:18px;border:0;background:var(--glass);color:#fff"><button class="btn" onclick="save()">Save Profile</button></div>

  <div class="bottom-nav">
    <button id="navBook" class="on" onclick="go('bookPage',this)">🏠</button>
    <button id="navHist" onclick="go('historyPage',this)">📜</button>
    <button id="navProf" onclick="go('profilePage',this)">👤</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, onSnapshot, updateDoc, getDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
  };
const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);
let uid,bid,map,riderM,routeLine;

onAuthStateChanged(auth,u=>{if(u){uid=u.uid;document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';initMap();loadP();loadH();check();}else{document.getElementById('loginScreen').style.display='flex';}});
async function login(){try{await signInWithEmailAndPassword(auth,email.value,pass.value);}catch(e){alert(e.message);}}
window.login=login;window.logout=()=>signOut(auth);

function initMap(){map=L.map('map',{zoomControl:false}).setView([13.81,121.02],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:''}).addTo(map);riderM=L.marker([13.81,121.02]).addTo(map);}

function swap(){const p=pickup.value;pickup.value=dropoff.value;dropoff.value=p;}
window.swap=swap;

function calcFare(km,petSize,isEmerg){
  const base=80;const kmFee=Math.round(km*15);
  const sizeFee=petSize==='medium'?50:petSize==='large'?100:0;
  const h=new Date().getHours();const nightFee=(h>=22||h<5)?30:0;
  const emergFee=isEmerg?100:0;const total=Math.max(250,base+kmFee+sizeFee+nightFee+emergFee);
  return{km,kmFee,sizeFee,nightFee,emergFee,total};
}

async function book(){
  bookBtn.disabled=true;bookBtn.textContent='Booking...';
  const p1=await geo(pickup.value);const p2=await geo(dropoff.value);
  if(!p1||!p2){alert('Invalid location');bookBtn.disabled=false;bookBtn.textContent='Book Pet Ride';return;}
  const km=hav(p1.lat,p1.lng,p2.lat,p2.lng);const petSize=petSize.value;const isEmerg=emergency.checked;const f=calcFare(km,petSize,isEmerg);
  km.textContent=f.km.toFixed(1)+' km';kmLabel.textContent=f.km.toFixed(1)+' km x ₱15';kmFee.textContent='₱'+f.kmFee;
  if(f.sizeFee>0){sizeFeeRow.style.display='flex';sizeFee.textContent='₱'+f.sizeFee;}
  if(f.nightFee>0){nightFeeRow.style.display='flex';}
  if(f.emergFee>0){emergFeeRow.style.display='flex';}
  fare.textContent='₱'+f.total;
  const ref=await addDoc(collection(db,'bookings'),{customerId:uid,petName:petName.value,petSize,isEmerg,pickup:pickup.value,pickupLat:p1.lat,pickupLng:p1.lng,dropoff:dropoff.value,dropoffLat:p2.lat,dropoffLng:p2.lng,...f,status:'pending',riderId:null,createdAt:serverTimestamp()});
  bid=ref.id;showTrack();bookBtn.disabled=false;bookBtn.textContent='Book Pet Ride';
}
window.book=book;

function showTrack(){bookView.style.display='none';trackView.style.display='block';}
function check(){onSnapshot(collection(db,'bookings'),s=>{const b=s.docs.find(d=>d.data().customerId===uid&&d.data().status!=='completed');if(b){bid=b.id;loadFare(b.data());listen(b.id);showTrack();}});}
function loadFare(b){km.textContent=b.km+' km';kmLabel.textContent=b.km+' km x ₱15';kmFee.textContent='₱'+b.kmFee;if(b.sizeFee>0){sizeFeeRow.style.display='flex';sizeFee.textContent='₱'+b.sizeFee;}if(b.nightFee>0){nightFeeRow.style.display='flex';}if(b.emergFee>0){emergFeeRow.style.display='flex';}fare.textContent='₱'+b.total;}
function listen(id){onSnapshot(doc(db,'bookings',id),s=>{const b=s.data();if(!b)return;if(b.riderId){onSnapshot(doc(db,'riders',b.riderId),r=>{const d=r.data();if(d){rName.textContent=d.name;rPlate.textContent=d.plate;if(d.lat){riderM.setLatLng([d.lat,d.lng]);map.setView([d.lat,d.lng],15);if(routeLine)map.removeLayer(routeLine);routeLine=L.polyline([[d.lat,d.lng],[b.pickupLat,b.pickupLng],[b.dropoffLat,b.dropoffLng]],{color:'#38bdf8',weight:4}).addTo(map);}}});}const st=b.status;status.textContent=st;document.querySelectorAll('.dot').forEach(x=>x.classList.remove('on'));if(st==='pending'){status.textContent='Waiting for Rider';status.style.background='#f59e0b';d1.classList.add('on');}if(st==='assigned'){status.textContent='Rider On The Way';status.style.background='#38bdf8';d1.classList.add('on');}if(st==='pickedup'){status.textContent='Pet Picked Up';d1.classList.add('on');d2.classList.add('on');}if(st==='otw'){status.textContent='On The Way';d1.classList.add('on');d2.classList.add('on');d3.classList.add('on');}if(st==='completed'){status.textContent='Dropped Off ✓';status.style.background='#16a34a';document.querySelectorAll('.dot').forEach(x=>x.classList.add('on'));}});}
async function cancel(){if(!bid)return;if(confirm('Cancel this ride?')){await deleteDoc(doc(db,'bookings',bid));trackView.style.display='none';bookView.style.display='block';sizeFeeRow.style.display='none';nightFeeRow.style.display='none';emergFeeRow.style.display='none';bid=null;}}
window.cancel=cancel;

function loadP(){getDoc(doc(db,'customers',uid)).then(s=>{if(s.exists()){pName.value=s.data().name||'';pPhone.value=s.data().phone||'';}});}
async function save(){await updateDoc(doc(db,'customers',uid),{name:pName.value,phone:pPhone.value},{merge:true});alert('Saved');}
window.save=save;

function loadH(){onSnapshot(collection(db,'bookings'),s=>{const m=s.docs.filter(d=>d.data().customerId===uid).sort((a,b)=>b.data().createdAt?.seconds-a.data().createdAt?.seconds);historyList.innerHTML=m.map(d=>`<div class="card"><b>${d.data().petName}</b> - ₱${d.data().total}<br><small>${d.data().pickup} > ${d.data().dropoff}<br>Status: ${d.data().status}</small></div>`).join('')||'<small>No rides yet</small>';});}
function go(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('on'));document.getElementById(id).classList.add('on');btn.classList.add('on');}
window.go=go;

function hav(a,b,c,d){const R=6371;const e=(c-a)*Math.PI/180;const f=(d-b)*Math.PI/180;const g=Math.sin(e/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(f/2)**2;return R*2*Math.atan2(Math.sqrt(g),Math.sqrt(1-g));}
async function geo(q){try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);const d=await r.json();if(d.length)return{lat:+d[0].lat,lng:+d[0].lon};}catch{}return null;}
</script>
</body>
</html>
